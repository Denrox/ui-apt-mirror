server {
    listen 80;
    server_name cheatsheets.mirror.intra;
    
    add_header Access-Control-Allow-Origin *;
    proxy_connect_timeout 1800;
    proxy_send_timeout 1800;
    proxy_read_timeout 1800;
    send_timeout 1800;

    # Block admin routes
    location ~ ^/(login|logout|home|logs|documentation|file-manager|users)($|/) {
        return 302 /;
    }

    # Allow everything else (root, assets, api, etc.)
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/cheatsheets.mirror.intra.access-$log_date.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/cheatsheets.mirror.intra.error.log;
}
