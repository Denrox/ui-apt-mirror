server {
    listen 80;
    server_name files.mirror.intra;

    add_header Access-Control-Allow-Origin *;
    proxy_connect_timeout 1800;
    proxy_send_timeout 1800;
    proxy_read_timeout 1800;
    send_timeout 1800;

    location /downloads/ {
        alias /var/www/files/;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        
        # Block access to files-private directory
        location ~ ^/downloads/files-private/ {
            deny all;
            return 403;
        }
        
        # Enable efficient streaming for large media files
        sendfile on;
        sendfile_max_chunk 1m;
        tcp_nopush on;
        tcp_nodelay on;
        
        # Enable range requests for seeking in videos
        add_header Accept-Ranges bytes;
    }

    # Block admin routes
    location ~ ^/(login|logout|home|logs|documentation|cheatsheets|users)($|/) {
        return 302 /;
    }

    # Allow everything else (root, assets, api, file-manager with query params, etc.)
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    access_log /var/log/nginx/files.mirror.intra.access.log;
    error_log /var/log/nginx/files.mirror.intra.error.log;
} 